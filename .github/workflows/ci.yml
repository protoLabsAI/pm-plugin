name: CI

# Lint + test the plugin. Runs on the org's Namespace Linux profile (not a GitHub-hosted
# runner) to keep CI cost down; falls back to ubuntu-latest on a fork that lacks the profile.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ vars.NSC_RUNNER || 'namespace-profile-protolabs-linux' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev deps
        run: pip install -r requirements-dev.txt ruff

      - name: Lint
        run: ruff check . && ruff format --check .

      - name: Test
        run: pytest -q
